name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without 'v' prefix (e.g. 0.12.3). Leave empty to derive from tag."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    name: build-release
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - name: select xcode 26
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${XCODE_26_DEVELOPER_DIR:-}" ]]; then
            echo "XCODE_26_DEVELOPER_DIR is not available on this runner"
            env | grep '^XCODE_.*_DEVELOPER_DIR' || true
            exit 1
          fi
          sudo xcode-select -s "$XCODE_26_DEVELOPER_DIR"
          xcodebuild -version
      - run: brew bundle --file Brewfile
      - id: vars
        shell: bash
        run: |
          set -euo pipefail
          input_version="${{ github.event.inputs.version || '' }}"
          if [[ -n "$input_version" ]]; then
            version="$input_version"
          elif [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            echo "Unable to determine release version. Provide workflow_dispatch input or push a v* tag." >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: just release-build
        env:
          FRAME_CODESIGN_IDENTITY: "-"
        run: just release-build "${{ steps.vars.outputs.version }}"
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Frame-v${{ steps.vars.outputs.version }}
          if-no-files-found: error
          path: |
            .release/Frame-v${{ steps.vars.outputs.version }}.zip
            .release/frame.rb
      - name: cat ./.release/xcodebuild.log
        if: ${{ always() }}
        run: |
          if test -f ./.release/xcodebuild.log; then
            cat ./.release/xcodebuild.log
          fi
