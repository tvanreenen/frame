# Start frame at login
start-at-login = false

# Persistent workspaces that stay alive even when empty
persistent-workspaces = ["1", "2", "3", "4", "5", "6", "7", "8", "9", "0"]

[key-mapping]
    preset = 'qwerty'

[gaps]
    inner.horizontal = 8
    inner.vertical =   8
    outer.left =       8
    outer.bottom =     8
    outer.top =        8
    outer.right =      8

[binding]
    # Focus: move between columns (h/l) and within column (j/k)
    alt-h = 'focus left'
    alt-j = 'focus down'
    alt-k = 'focus up'
    alt-l = 'focus right'
    # Move: push window to adjacent column (h/l), reorder within column (j/k)
    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'
    # Resize: ctrl-shift-alt + hjkl
    ctrl-shift-alt-h = 'resize width -50'
    ctrl-shift-alt-l = 'resize width +50'
    ctrl-shift-alt-j = 'resize height +50'
    ctrl-shift-alt-k = 'resize height -50'
    # Workspaces (alt-1 through alt-0)
    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'
    alt-6 = 'workspace 6'
    alt-7 = 'workspace 7'
    alt-8 = 'workspace 8'
    alt-9 = 'workspace 9'
    alt-0 = 'workspace 0'
    # Move window to workspace
    alt-shift-1 = 'move-node-to-workspace 1'
    alt-shift-2 = 'move-node-to-workspace 2'
    alt-shift-3 = 'move-node-to-workspace 3'
    alt-shift-4 = 'move-node-to-workspace 4'
    alt-shift-5 = 'move-node-to-workspace 5'
    alt-shift-6 = 'move-node-to-workspace 6'
    alt-shift-7 = 'move-node-to-workspace 7'
    alt-shift-8 = 'move-node-to-workspace 8'
    alt-shift-9 = 'move-node-to-workspace 9'
    alt-shift-0 = 'move-node-to-workspace 0'
    # Fullscreen toggle
    alt-f = 'fullscreen'
